kind = "web"
previewPath = "/"
title = "Incognito Intel"
version = "1.0.0"
id = "artifacts/incognito-intel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20692

[services.development]
run = "pnpm --filter @workspace/incognito-intel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/incognito-intel", "run", "build" ]
publicDir = "artifacts/incognito-intel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20692"
BASE_PATH = "/"
